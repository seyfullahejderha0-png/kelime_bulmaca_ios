workflows:
  ios-workflow:
    name: LibGDX iOS RoboVM IPA

    environment:
      xcode: latest
      java: 17
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.studioyes.wordconnect

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Setup keychain and build IPA
        script: |
          set -e
          WORKDIR=$(pwd)

          # ── Provisioning profile ──────────────────────────────────────
          PROFILE=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE" ]; then
            echo "❌ No provisioning profile found!"
            exit 1
          fi
          echo "✅ Profile: $PROFILE"

          # UUID'yi grep/sed ile çıkar (PlistBuddy pipe problemi olmaz)
          PROFILE_UUID=$(security cms -D -i "$PROFILE" 2>/dev/null \
            | grep -A1 '<key>UUID</key>' \
            | tail -1 \
            | sed 's|.*<string>\(.*\)</string>.*|\1|' \
            | tr -d '[:space:]')
          echo "UUID: [$PROFILE_UUID]"

          if [ -z "$PROFILE_UUID" ]; then
            echo "❌ UUID extraction failed!"
            exit 1
          fi

          # ── Keychains ──────────────────────────────────────────────────
          echo "=== Keychains ==="
          security list-keychains

          echo "=== Signing identities ==="
          security find-identity -v -p codesigning

          # ── robovm.properties (printf ile yaz — heredoc indentation sorunu yok) ──
          printf 'app.id=com.studioyes.wordconnect\n' > ios/robovm.properties
          printf 'app.signingIdentity=Apple Distribution: SEYFULLAH EJDERHA (33H863YMQ7)\n' >> ios/robovm.properties
          printf 'app.provisioningProfile=%s\n' "$PROFILE_UUID" >> ios/robovm.properties

          echo "=== robovm.properties ==="
          cat ios/robovm.properties

          # ── createIPA (daemon olmadan, cache bypass) ───────────────────
          echo "=== Running createIPA ==="
          ./gradlew ios:createIPA -x test --rerun-tasks --no-daemon --stacktrace 2>&1 | tee /tmp/robovm_build.log
          BUILD_EXIT=${PIPESTATUS[0]}

          echo "=== Relevant log lines ==="
          grep -E "signing|identity|profile|provisioningProfile|ERROR|Exception|FAILED|SUCCESS|ipa" \
            /tmp/robovm_build.log | tail -80 || true

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "❌ createIPA failed (exit $BUILD_EXIT)"
            exit 1
          fi

          # ── IPA bul ───────────────────────────────────────────────────
          echo "=== Searching for IPA ==="
          find "$WORKDIR" -name "*.ipa" -not -path "*.gradle*" 2>/dev/null

          IPA=$(find "$WORKDIR" -name "*.ipa" -not -path "*.gradle*" | head -1)
          if [ -z "$IPA" ]; then
            echo "❌ No .ipa found!"
            find "$WORKDIR/ios/build" -not -path "*.gradle*" 2>/dev/null | head -50
            exit 1
          fi

          echo "✅ IPA: $IPA ($(du -h "$IPA" | cut -f1))"
          mkdir -p "$WORKDIR/ios/build/ipa"
          cp "$IPA" "$WORKDIR/ios/build/ipa/WordConnect.ipa"
          echo "✅ Done: ios/build/ipa/WordConnect.ipa"

    artifacts:
      - ios/build/ipa/*.ipa
