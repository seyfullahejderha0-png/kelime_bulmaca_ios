workflows:
  ios-workflow:
    name: LibGDX iOS RoboVM IPA

    environment:
      xcode: latest
      java: 11

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Show signing environment
        script: |
          echo "=== Xcode version ==="
          xcodebuild -version
          echo "=== Certificates ==="
          security find-identity -v -p codesigning
          echo "=== Provisioning Profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles directory"
          echo "=== Keychains ==="
          security list-keychains -d user

      - name: Build IPA (Skip Signing)
        script: |
          set -e
          
          # Since ios_signing is removed from codemagic.yaml, the macOS keychain is clean.
          # We rely on the hardcoded iosSkipSigning=true in ios/build.gradle.
          # This should produce an UNSIGNED .ipa or .app that we can inspect.
          
          ./gradlew ios:createIPA \
            -Probovm.archs=arm64 \
            -x test \
            --no-daemon \
            --info \
            --stacktrace \
            2>&1 | tee /tmp/robovm_build.log
            
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "BUILD FAILED"
            tail -100 /tmp/robovm_build.log || true
            exit 1
          fi
          
          echo "createIPA succeeded! Unsigned IPA is ready."

    artifacts:
      - ios/build/ipa/*.ipa
