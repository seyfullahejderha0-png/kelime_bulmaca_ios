workflows:
  ios-workflow:
    name: LibGDX iOS Build

    environment:
      xcode: latest
      java: 17
      ios_signing:
        certificates:
          - Apple Distribution
 # certificate adı (UI'daki adı birebir)
        provisioning_profiles:
          - word connect  # profile adı birebir

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Build iOS IPA
        script: ./gradlew ios:createIPA

    artifacts:
      - ios/build/robovm/**/*.ipa