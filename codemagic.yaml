workflows:
  ios-workflow:
    name: LibGDX iOS RoboVM IPA

    environment:
      xcode: latest
      java: 11
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.studioyes.wordconnect

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Show signing environment
        script: |
          echo "=== Xcode version ==="
          xcodebuild -version
          echo "=== Certificates ==="
          security find-identity -v -p codesigning
          echo "=== Provisioning Profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles directory"
          echo "=== Keychains ==="
          security list-keychains -d user

      - name: Build app binary (Skip Signing workaround)
        script: |
          set -e
          
          # RoboVM crashes if no provisioning profile exists on the system at all,
          # even if iosSkipSigning=true. We create a dummy profile to satisfy the parser.
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          
          cat << 'EOF' > ~/Library/MobileDevice/Provisioning\ Profiles/dummy.mobileprovision
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>AppIDName</key>
            <string>Dummy</string>
            <key>ApplicationIdentifierPrefix</key>
            <array><string>PREFIX</string></array>
            <key>CreationDate</key>
            <date>2024-01-01T00:00:00Z</date>
            <key>Platform</key>
            <array><string>iOS</string></array>
            <key>Entitlements</key>
            <dict>
              <key>application-identifier</key>
              <string>PREFIX.com.studioyes.wordconnect</string>
            </dict>
            <key>ExpirationDate</key>
            <date>2030-01-01T00:00:00Z</date>
            <key>Name</key>
            <string>Dummy Profile</string>
            <key>ProvisionedDevices</key>
            <array></array>
            <key>TeamIdentifier</key>
            <array><string>PREFIX</string></array>
            <key>TeamName</key>
            <string>Dummy Team</string>
            <key>TimeToLive</key>
            <integer>3650</integer>
            <key>UUID</key>
            <string>00000000-0000-0000-0000-000000000000</string>
            <key>Version</key>
            <integer>1</integer>
          </dict>
          </plist>
          EOF

          ./gradlew ios:robovmInstall \
            -Probovm.iosProvisioningProfile="00000000-0000-0000-0000-000000000000" \
            -Probovm.archs=arm64 \
            -x test \
            --no-daemon \
            --info \
            --stacktrace \
            2>&1 | tee /tmp/robovm_build.log
            
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "BUILD FAILED"
            tail -100 /tmp/robovm_build.log || true
            exit 1
          fi
          echo "robovmInstall succeeded"

      - name: Sign and package IPA manually
        script: |
          set -e
          WORKDIR=$(pwd)

          # Find .app bundle
          APP=$(find "$WORKDIR/ios/build/robovm" -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "No .app found, searching wider..."
            find "$WORKDIR/ios/build" -type d 2>/dev/null
            exit 1
          fi
          echo "App bundle: $APP"

          # Find provisioning profile
          PROFILE=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE" ]; then
            echo "No provisioning profile found!"
            exit 1
          fi
          echo "Profile: $PROFILE"

          # Extract UUID using security + grep only (no python multiline)
          PROFILE_UUID=$(security cms -D -i "$PROFILE" 2>/dev/null | grep -A1 '<key>UUID</key>' | tail -1 | sed 's/.*<string>\(.*\)<\/string>.*/\1/' | tr -d '[:space:]')
          echo "UUID: $PROFILE_UUID"

          # Extract entitlements from profile
          security cms -D -i "$PROFILE" 2>/dev/null > /tmp/profile_decoded.plist
          /usr/libexec/PlistBuddy -x -c "Print :Entitlements" /tmp/profile_decoded.plist > /tmp/entitlements.plist 2>/dev/null || true
          echo "Entitlements:"
          cat /tmp/entitlements.plist || true

          # Copy embedded profile
          cp "$PROFILE" "$APP/embedded.mobileprovision"

          # Find signing identity fingerprint
          SIGN_FP=$(security find-identity -v -p codesigning \
            | grep -E 'Apple Distribution|iPhone Distribution|Apple Development|iPhone Developer' \
            | head -1 | awk '{print $2}')

          if [ -z "$SIGN_FP" ]; then
            # Grab any valid identity
            SIGN_FP=$(security find-identity -v -p codesigning \
              | grep -v "REVOKED\|EXPIRED" | grep -E "[0-9A-F]{40}" | head -1 | awk '{print $2}')
          fi

          if [ -z "$SIGN_FP" ]; then
            echo "No signing identity found!"
            security find-identity -v -p codesigning
            exit 1
          fi
          echo "Signing with: $SIGN_FP"

          # Sign frameworks if any
          if [ -d "$APP/Frameworks" ]; then
            for FW in "$APP/Frameworks"/*; do
              echo "Signing framework: $FW"
              codesign --force --sign "$SIGN_FP" "$FW" || true
            done
          fi

          # Sign the app
          if [ -f "/tmp/entitlements.plist" ] && [ -s "/tmp/entitlements.plist" ]; then
            codesign --force --sign "$SIGN_FP" --entitlements /tmp/entitlements.plist --timestamp=none "$APP"
          else
            codesign --force --sign "$SIGN_FP" --timestamp=none "$APP"
          fi

          echo "Verifying..."
          codesign --verify --verbose "$APP" || true

          # Package as IPA
          TMPDIR_IPA=$(mktemp -d)
          mkdir -p "$TMPDIR_IPA/Payload"
          cp -r "$APP" "$TMPDIR_IPA/Payload/"
          mkdir -p "$WORKDIR/ios/build/ipa"
          (cd "$TMPDIR_IPA" && zip -r "$WORKDIR/ios/build/ipa/WordConnect.ipa" Payload)
          echo "IPA created: $(du -h "$WORKDIR/ios/build/ipa/WordConnect.ipa" | cut -f1)"

    artifacts:
      - ios/build/ipa/*.ipa
