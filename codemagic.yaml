workflows:
  ios-workflow:
    name: LibGDX iOS RoboVM IPA

    environment:
      xcode: latest
      java: 17
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.studioyes.wordconnect

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Setup keychain and build IPA
        script: |
          set -e
          WORKDIR=$(pwd)

          # ── Provisioning profile ──────────────────────────────────────
          PROFILE=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE" ]; then
            echo "❌ No provisioning profile found!"
            exit 1
          fi
          echo "✅ Profile: $PROFILE"

          # UUID'yi profil içinden çıkar
          PROFILE_UUID=$(security cms -D -i "$PROFILE" 2>/dev/null | \
            grep -A1 '<key>UUID</key>' | tail -1 | \
            sed 's/.*<string>\(.*\)<\/string>.*/\1/' | tr -d '[:space:]')
          echo "UUID: $PROFILE_UUID"

          # ── Keychains ──────────────────────────────────────────────────
          echo "=== Keychains ==="
          security list-keychains

          echo "=== Signing identities ==="
          security find-identity -v -p codesigning

          # ── robovm.properties ─────────────────────────────────────────
          cat > ios/robovm.properties << EOF
          app.id=com.studioyes.wordconnect
          app.signingIdentity=Apple Distribution: SEYFULLAH EJDERHA (33H863YMQ7)
          app.provisioningProfile=$PROFILE_UUID
          EOF

          echo "=== robovm.properties ==="
          cat ios/robovm.properties

          # ── createIPA ─────────────────────────────────────────────────
          echo "=== Running createIPA ==="
          ./gradlew ios:createIPA -x test --rerun-tasks --info 2>&1 | tee /tmp/robovm_build.log
          BUILD_EXIT=${PIPESTATUS[0]}

          # Hata durumunda önemli satırları göster
          grep -E "robovm|signing|identity|profile|FAILED|ERROR|Exception" /tmp/robovm_build.log | tail -50 || true

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "❌ createIPA failed!"
            exit 1
          fi

          # ── IPA bul ───────────────────────────────────────────────────
          echo "=== Searching for IPA ==="
          find "$WORKDIR" -name "*.ipa" -not -path "*.gradle*" 2>/dev/null

          IPA=$(find "$WORKDIR" -name "*.ipa" -not -path "*.gradle*" | head -1)
          if [ -z "$IPA" ]; then
            echo "❌ No .ipa found!"
            find "$WORKDIR/ios/build" -not -path "*.gradle*" 2>/dev/null | head -50
            exit 1
          fi

          echo "✅ IPA: $IPA ($(du -h "$IPA" | cut -f1))"
          mkdir -p "$WORKDIR/ios/build/ipa"
          cp "$IPA" "$WORKDIR/ios/build/ipa/WordConnect.ipa"
          echo "✅ Done: ios/build/ipa/WordConnect.ipa"

    artifacts:
      - ios/build/ipa/*.ipa
