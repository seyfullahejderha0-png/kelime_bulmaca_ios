workflows:
  ios-workflow:
    name: LibGDX iOS RoboVM IPA

    environment:
      xcode: latest
      java: 17
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.studioyes.wordconnect

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Inspect provisioning profile
        script: |
          PROFILE=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | head -1)
          echo "=== Profile file: $PROFILE ==="
          security cms -D -i "$PROFILE" > /tmp/profile.plist
          echo "=== Bundle ID in profile ==="
          /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/profile.plist
          echo "=== UUID ==="
          /usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist
          echo "=== Team ID ==="
          /usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /tmp/profile.plist

      - name: Inject signing into robovm.properties
        script: |
          PROFILE=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | head -1)
          UUID=$(security cms -D -i "$PROFILE" | grep -A1 "<key>UUID</key>" | grep "<string>" | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          echo "app.id=com.studioyes.wordconnect" > ios/robovm.properties
          echo "app.signingIdentity=Apple Distribution: SEYFULLAH EJDERHA (33H863YMQ7)" >> ios/robovm.properties
          echo "app.provisioningProfile=$UUID" >> ios/robovm.properties
          echo "--- robovm.properties ---"
          cat ios/robovm.properties

      - name: Build iOS IPA
        script: ./gradlew ios:createIPA --info 2>&1 | tail -100

    artifacts:
      - ios/build/robovm/**/*.ipa
      - ios/build/**/*.ipa
