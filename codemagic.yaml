workflows:
  ios-workflow:
    name: LibGDX iOS Xcode Build

    environment:
      xcode: latest
      java: 17
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.studioyes.wordconnect

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      # 1️⃣ RoboVM Xcode project üretir (IPA üretmez)
      - name: Generate Xcode project
        script: ./gradlew ios:build

      # 2️⃣ Archive oluştur
      - name: Build Xcode archive
        script: |
          cd ios/build/robovm
          xcodebuild \
            -project WordConnect.xcodeproj \
            -scheme WordConnect \
            -configuration Release \
            -archivePath build/WordConnect.xcarchive \
            archive

      # 3️⃣ Export IPA
      - name: Export IPA
        script: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath ios/build/robovm/build/WordConnect.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ios/build/robovm/build

    artifacts:
      - ios/build/robovm/build/*.ipa
