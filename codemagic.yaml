workflows:
  ios-workflow:
    name: LibGDX iOS RoboVM IPA

    integrations:
      app_store_connect: "Codemagic App Store Connect"

    environment:
      xcode: latest
      java: 11
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.studioyes.wordconnect

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Find signing identity
        script: |
          echo "=== Installed certificates ==="
          security find-identity -v -p codesigning

          SIGN_ID=$(security find-identity -v -p codesigning \
            | grep -E '"(Apple Distribution|iPhone Distribution)' \
            | head -1 \
            | sed -E 's/.*"(.+)".*/\1/')

          echo "SIGN_ID: $SIGN_ID"

          PP_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          echo "PP_PATH: $PP_PATH"

          if [ -n "$PP_PATH" ]; then
            UUID=$(security cms -D -i "$PP_PATH" \
              | /usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin 2>/dev/null)
            echo "UUID: $UUID"
          fi

      - name: Clean build
        script: ./gradlew clean --no-daemon

      - name: Build and sign IPA
        script: |
          # Find signing identity
          SIGN_ID=$(security find-identity -v -p codesigning \
            | grep -E '"(Apple Distribution|iPhone Distribution)' \
            | head -1 \
            | sed -E 's/.*"(.+)".*/\1/')

          echo "Using signing identity: $SIGN_ID"

          # Find provisioning profile UUID
          PP_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          UUID=""
          if [ -n "$PP_PATH" ]; then
            UUID=$(security cms -D -i "$PP_PATH" \
              | /usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin 2>/dev/null)
          fi
          echo "Using provisioning profile UUID: $UUID"

          ./gradlew ios:createIPA \
            -Probovm.archs=arm64 \
            -Probovm.debug=false \
            -Probovm.iosSignIdentity="$SIGN_ID" \
            -Probovm.iosProvisioningProfile="$UUID" \
            -x test \
            --no-daemon \
            --info \
            --warning-mode all \
            --stacktrace

      - name: Locate IPA
        script: |
          IPA_PATH=$(find ios/build -name "*.ipa" | head -n 1)
          echo "IPA found: $IPA_PATH"
          cp "$IPA_PATH" "$CM_BUILD_DIR/WordConnect.ipa"

    artifacts:
      - WordConnect.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true