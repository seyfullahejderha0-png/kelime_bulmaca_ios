workflows:
  ios-workflow:
    name: LibGDX iOS RoboVM IPA

    environment:
      xcode: latest
      java: 11
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.studioyes.wordconnect

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Build and Sign IPA
        script: |
          set -e
          
          # Now that the Codemagic UI certificate is fixed, ios_signing will correctly
          # populate the macOS keychain. We simply run createIPA without bypasses.
          ./gradlew ios:createIPA \
            -Probovm.archs=arm64 \
            -x test \
            --no-daemon \
            --info \
            --stacktrace \
            2>&1 | tee /tmp/robovm_build.log
            
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "BUILD FAILED"
            tail -100 /tmp/robovm_build.log || true
            exit 1
          fi
          
          echo "createIPA succeeded! Signed IPA is ready."

    artifacts:
      - ios/build/ipa/*.ipa
