workflows:
  ios-workflow:
    name: LibGDX iOS RoboVM IPA

    environment:
      xcode: latest
      java: 17
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.studioyes.wordconnect

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: List signing identities
        script: security find-identity -v -p codesigning

      - name: Build IPA
        script: |
          ./gradlew ios:createIPA \
          -Probovm.archs=arm64 \
          -Probovm.debug=true \
          -Probovm.skipSigning=false \
          -x test \
          --no-daemon \
          --stacktrace

      - name: Locate IPA
        script: |
          IPA_PATH=$(find ios/build -name "*.ipa" | head -n 1)

          echo "IPA found:"
          echo $IPA_PATH

          cp "$IPA_PATH" "$CM_BUILD_DIR/WordConnect.ipa"

    artifacts:
      - WordConnect.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true