workflows:
  ios-workflow:
    name: LibGDX iOS RoboVM IPA

    environment:
      xcode: latest
      java: 17
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.studioyes.wordconnect

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Build iOS binary (no signing)
        script: ./gradlew ios:build

      - name: Find .app bundle
        script: |
          APP=$(find ios/build -name "*.app" -not -path "*dSYM*" | head -1)
          echo "Found app: $APP"
          ls -la "$APP" || echo "App not found, listing build dir:"
          find ios/build -type d | head -20

      - name: Sign and package IPA
        script: |
          # Find .app bundle
          APP=$(find ios/build -name "*.app" -not -path "*dSYM*" | head -1)
          echo "Signing: $APP"

          # Get provisioning profile
          PROFILE=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | head -1)
          echo "Profile: $PROFILE"

          # Extract entitlements from profile
          security cms -D -i "$PROFILE" > /tmp/profile.plist
          /usr/libexec/PlistBuddy -x -c "Print :Entitlements" /tmp/profile.plist > /tmp/entitlements.plist
          echo "Entitlements:"
          cat /tmp/entitlements.plist

          # Embed provisioning profile
          cp "$PROFILE" "$APP/embedded.mobileprovision"

          # Sign frameworks inside .app first
          find "$APP/Frameworks" -name "*.framework" -exec \
            codesign --force --sign "Apple Distribution: SEYFULLAH EJDERHA (33H863YMQ7)" {} \; 2>/dev/null || true

          # Sign the .app
          codesign --force --sign "Apple Distribution: SEYFULLAH EJDERHA (33H863YMQ7)" \
            --entitlements /tmp/entitlements.plist \
            --timestamp \
            "$APP"

          # Verify signing
          codesign --verify --deep --strict "$APP"
          echo "Signing verified ✅"

          # Package into IPA
          mkdir -p /tmp/Payload
          cp -r "$APP" /tmp/Payload/
          cd /tmp
          zip -qr WordConnect.ipa Payload/
          mkdir -p "$OLDPWD/ios/build/ipa"
          cp WordConnect.ipa "$OLDPWD/ios/build/ipa/"
          echo "IPA created: ios/build/ipa/WordConnect.ipa"

    artifacts:
      - ios/build/ipa/*.ipa
