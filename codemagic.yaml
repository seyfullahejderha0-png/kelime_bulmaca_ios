workflows:
  ios-workflow:
    name: LibGDX iOS RoboVM IPA

    environment:
      xcode: latest
      java: 17
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.studioyes.wordconnect

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Build binary (RoboVM)
        script: |
          set -e
          WORKDIR=$(pwd)

          # robovm.properties — sadece bundle ID, imzalama YOK
          printf 'app.id=com.studioyes.wordconnect\n' > ios/robovm.properties
          echo "=== robovm.properties ==="
          cat ios/robovm.properties

          # createIPA imzalama hatası verebilir; biz sadece .app'i istiyoruz
          # set -e'yi "|| true" ile geçersiz kıl
          ./gradlew ios:createIPA -x test --no-daemon 2>&1 | tee /tmp/robovm_build.log || true

          echo "=== Build directory ==="
          find "$WORKDIR/ios/build" -type d | head -30

          # .app bundle'ı bul
          APP=$(find "$WORKDIR/ios/build" -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "❌ No .app bundle found after RoboVM build!"
            cat /tmp/robovm_build.log | tail -30
            exit 1
          fi
          echo "✅ .app found: $APP"

      - name: Sign and package IPA
        script: |
          set -e
          WORKDIR=$(pwd)

          # .app'i tekrar bul
          APP=$(find "$WORKDIR/ios/build" -name "*.app" -type d 2>/dev/null | head -1)
          echo "Signing: $APP"

          # Provisioning profile
          PROFILE=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          echo "Profile: $PROFILE"

          # Entitlements
          security cms -D -i "$PROFILE" > /tmp/profile.plist
          /usr/libexec/PlistBuddy -x -c 'Print :Entitlements' /tmp/profile.plist > /tmp/entitlements.plist
          echo "=== Entitlements ==="
          cat /tmp/entitlements.plist

          # Keychain (Codemagic'in oluşturduğu)
          BUILD_KEYCHAIN=$(security list-keychains | grep codemagic | tr -d '" ' | head -1)
          echo "Keychain: $BUILD_KEYCHAIN"

          # Signing identity
          CERT_ID=$(security find-identity -v -p codesigning "$BUILD_KEYCHAIN" 2>/dev/null \
            | grep "Apple Distribution" | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$CERT_ID" ]; then
            CERT_ID="Apple Distribution: SEYFULLAH EJDERHA (33H863YMQ7)"
          fi
          echo "Certificate: $CERT_ID"

          # embedded.mobileprovision kopyala
          cp "$PROFILE" "$APP/embedded.mobileprovision"

          # Frameworks varsa önce imzala
          if [ -d "$APP/Frameworks" ]; then
            find "$APP/Frameworks" -name "*.dylib" -o -name "*.framework" | while read fw; do
              codesign --force --sign "$CERT_ID" \
                --keychain "$BUILD_KEYCHAIN" "$fw" || true
            done
          fi

          # Ana bundle'ı imzala
          codesign --force --sign "$CERT_ID" \
            --keychain "$BUILD_KEYCHAIN" \
            --entitlements /tmp/entitlements.plist \
            --timestamp=none \
            "$APP"

          echo "=== Codesign verify ==="
          codesign --verify --verbose "$APP" || true

          # IPA oluştur
          PAYLOAD_DIR=$(mktemp -d)/Payload
          mkdir -p "$PAYLOAD_DIR"
          cp -r "$APP" "$PAYLOAD_DIR/"

          mkdir -p "$WORKDIR/ios/build/ipa"
          IPA_PATH="$WORKDIR/ios/build/ipa/WordConnect.ipa"
          (cd "$(dirname $PAYLOAD_DIR)" && zip -qr "$IPA_PATH" Payload/)

          echo "✅ IPA: $IPA_PATH ($(du -h "$IPA_PATH" | cut -f1))"

    artifacts:
      - ios/build/ipa/*.ipa
