workflows:
  ios-workflow:
    name: LibGDX iOS RoboVM IPA

    environment:
      xcode: latest
      java: 17
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.studioyes.wordconnect

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Inject profile and build IPA
        script: |
          set -e
          WORKDIR=$(pwd)

          # ── Provisioning profile bul ─────────────────────────────────
          echo "=== Available profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || true

          PROFILE=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE" ]; then
            echo "❌ No provisioning profile found!"
            exit 1
          fi
          echo "Profile: $PROFILE"

          # ── robovm.properties'e yaz (echo ile, heredoc değil) ────────
          echo "app.id=com.studioyes.wordconnect" > ios/robovm.properties
          echo "app.signingIdentity=Apple Distribution: SEYFULLAH EJDERHA (33H863YMQ7)" >> ios/robovm.properties
          echo "app.provisioningProfile=$PROFILE" >> ios/robovm.properties

          echo "=== robovm.properties ==="
          cat ios/robovm.properties

          # ── createIPA çalıştır ────────────────────────────────────────
          echo "=== Running createIPA ==="
          ./gradlew ios:createIPA -x test 2>&1 | tail -200

          # ── IPA'yı bul ────────────────────────────────────────────────
          echo "=== Searching for IPA ==="
          find "$WORKDIR" -name "*.ipa" -not -path "*.gradle*" 2>/dev/null

          IPA=$(find "$WORKDIR" -name "*.ipa" -not -path "*.gradle*" | head -1)
          if [ -z "$IPA" ]; then
            echo "❌ No .ipa found!"
            echo "=== ios/build tree ==="
            find "$WORKDIR/ios/build" -not -path "*.gradle*" 2>/dev/null | head -50
            exit 1
          fi

          echo "✅ IPA: $IPA ($(du -h "$IPA" | cut -f1))"
          mkdir -p "$WORKDIR/ios/build/ipa"
          cp "$IPA" "$WORKDIR/ios/build/ipa/WordConnect.ipa"
          echo "✅ Copied to ios/build/ipa/WordConnect.ipa"

    artifacts:
      - ios/build/ipa/*.ipa
