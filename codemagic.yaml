workflows:
  ios-workflow:
    name: LibGDX iOS RoboVM IPA

    environment:
      xcode: latest
      java: 11
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.studioyes.wordconnect

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Build IPA (unsigned)
        script: |
          ./gradlew ios:createIPA \
            -Probovm.archs=arm64 \
            -x test \
            --no-daemon \
            --stacktrace

      - name: Sign IPA
        script: |
          IPA_PATH=$(find ios/build -name "*.ipa" | head -n 1)

          echo "IPA found:"
          echo $IPA_PATH

          cp "$IPA_PATH" "$CM_BUILD_DIR/WordConnect.ipa"

    artifacts:
      - WordConnect.ipa