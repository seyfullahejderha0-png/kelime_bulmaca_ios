workflows:
  ios-workflow:
    name: LibGDX iOS RoboVM IPA

    environment:
      xcode: latest
      java: 17
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.studioyes.wordconnect

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Build IPA with RoboVM
        script: |
          set -e
          WORKDIR=$(pwd)

          # ── Provisioning profile ──────────────────────────────────────
          PROFILE=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE" ]; then echo "❌ No provisioning profile found!"; exit 1; fi
          echo "✅ Profile path: $PROFILE"

          # ── Profile UUID — Python ile çıkart (en güvenilir yöntem) ───
          PROFILE_UUID=$(python3 - <<'PYEOF'
import subprocess, plistlib, sys, os
profile = os.environ.get("PROFILE_PATH", "")
try:
    raw = subprocess.check_output(["security", "cms", "-D", "-i", profile], stderr=subprocess.DEVNULL)
    p = plistlib.loads(raw)
    print(p["UUID"])
except Exception as e:
    sys.exit(f"UUID extraction failed: {e}")
PYEOF
          ) || true

          # Fallback: XML grep ile UUID çıkart
          if [ -z "$PROFILE_UUID" ]; then
            PROFILE_UUID=$(security cms -D -i "$PROFILE" 2>/dev/null \
              | grep -A1 '<key>UUID</key>' | tail -1 \
              | sed 's/.*<string>\(.*\)<\/string>.*/\1/' | tr -d '[:space:]')
          fi

          if [ -z "$PROFILE_UUID" ]; then
            echo "❌ Could not extract UUID from provisioning profile!"; exit 1
          fi
          echo "✅ Profile UUID: $PROFILE_UUID"

          # ── Keychain ──────────────────────────────────────────────────
          BUILD_KEYCHAIN=$(security list-keychains | grep codemagic | tr -d '" ' | head -1)
          if [ -z "$BUILD_KEYCHAIN" ]; then
            BUILD_KEYCHAIN=$(security list-keychains | grep -v "login\|System\|ROOT" | head -1 | tr -d '" ')
          fi
          echo "Build keychain: $BUILD_KEYCHAIN"

          security set-keychain-settings -lut 7200 "$BUILD_KEYCHAIN" || true
          security unlock-keychain -p "" "$BUILD_KEYCHAIN" || true
          security default-keychain -s "$BUILD_KEYCHAIN" || true
          security list-keychains -d user -s "$BUILD_KEYCHAIN" \
            ~/Library/Keychains/login.keychain-db || true

          echo "=== Default keychain ==="
          security default-keychain

          echo "=== Signing identities ==="
          security find-identity -v -p codesigning

          # ── Sign identity ─────────────────────────────────────────────
          SIGN_ID=$(security find-identity -v -p codesigning "$BUILD_KEYCHAIN" \
            | grep "Apple Distribution" | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$SIGN_ID" ]; then
            SIGN_ID=$(security find-identity -v -p codesigning "$BUILD_KEYCHAIN" \
              | grep -E "Distribution|iPhone Distribution" | head -1 \
              | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "✅ Sign identity: $SIGN_ID"

          echo "=== Passing to RoboVM ==="
          echo "  iosSignIdentity      = $SIGN_ID"
          echo "  iosProvisioningProfile = $PROFILE_UUID"

          # ── createIPA ─────────────────────────────────────────────────
          echo "=== Running createIPA ==="
          ./gradlew ios:createIPA \
            -Probovm.iosSignIdentity="$SIGN_ID" \
            -Probovm.iosProvisioningProfile="$PROFILE_UUID" \
            -x test \
            --no-daemon \
            --info \
            2>&1 | tee /tmp/robovm_build.log
          BUILD_EXIT=${PIPESTATUS[0]}

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "❌ createIPA failed (exit $BUILD_EXIT)"
            echo "--- Relevant log lines ---"
            grep -iE "sign|identity|profile|provisioningProfile|fingerprint|certificate|bundleId|ERROR|FAILED|IOException|Element|No provisioning|UUID|candidate|null" \
              /tmp/robovm_build.log | grep -v "^>" | grep -v "Downloading\|Resource missing" | tail -60 || true
            exit 1
          fi

          # ── IPA bul ───────────────────────────────────────────────────
          IPA=$(find "$WORKDIR" -name "*.ipa" -not -path "*.gradle*" | head -1)
          if [ -z "$IPA" ]; then
            echo "❌ No .ipa found"
            find "$WORKDIR" -name "*.ipa" 2>/dev/null || true
            exit 1
          fi
          mkdir -p "$WORKDIR/ios/build/ipa"
          cp "$IPA" "$WORKDIR/ios/build/ipa/WordConnect.ipa"
          echo "✅ Done: ios/build/ipa/WordConnect.ipa ($(du -h "$IPA" | cut -f1))"

    artifacts:
      - ios/build/ipa/*.ipa
