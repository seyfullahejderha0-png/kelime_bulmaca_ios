workflows:
  ios-workflow:
    name: LibGDX iOS Build

    environment:
      xcode: latest
      java: 17
      ios_signing:
        certificates:
          - wordconnect_distribution
        provisioning_profiles:
          - wordconnect_profile

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: List signing identities (debug)
        script: security find-identity -v -p codesigning

      - name: Build iOS IPA
        script: ./gradlew ios:createIPA

    artifacts:
      - ios/build/robovm/**/*.ipa