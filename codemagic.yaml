workflows:
  ios-workflow:
    name: LibGDX iOS RoboVM IPA

    environment:
      xcode: latest
      java: 17
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.studioyes.wordconnect

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Inject provisioning profile into robovm.properties
        script: |
          set -e

          echo "=== Available provisioning profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null

          PROFILE=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)

          if [ -z "$PROFILE" ]; then
            echo "❌ No provisioning profile found!"
            exit 1
          fi

          echo "✅ Profile: $PROFILE"

          # robovm.properties'e tam yolu yaz
          # Bu sayede RoboVM profil EŞLEŞTIRME adımını atlar (2.3.23 bug bypass)
          cat > ios/robovm.properties << EOF
          app.id=com.studioyes.wordconnect
          app.signingIdentity=Apple Distribution: SEYFULLAH EJDERHA (33H863YMQ7)
          app.provisioningProfile=${PROFILE}
          EOF

          echo "=== robovm.properties ==="
          cat ios/robovm.properties

      - name: Build IPA with createIPA
        script: |
          set -e
          ./gradlew ios:createIPA -x test 2>&1 | tail -200

          echo ""
          echo "=== Searching for IPA ==="
          find . -name "*.ipa" -not -path "*.gradle*" 2>/dev/null

          IPA=$(find . -name "*.ipa" -not -path "*.gradle*" | head -1)
          if [ -z "$IPA" ]; then
            echo "❌ No .ipa found! Looking for .app as fallback..."
            find . -name "*.app" -not -path "*dSYM*" -not -path "*.gradle*" 2>/dev/null
            # build dir tree
            find ./ios/build -type d 2>/dev/null | head -40
            exit 1
          fi

          echo "✅ IPA found: $IPA ($(du -h "$IPA" | cut -f1))"
          mkdir -p ios/build/ipa
          cp "$IPA" ios/build/ipa/WordConnect.ipa
          echo "✅ Copied to ios/build/ipa/WordConnect.ipa"

    artifacts:
      - ios/build/ipa/*.ipa
