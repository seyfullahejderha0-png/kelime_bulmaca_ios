workflows:
  ios-workflow:
    name: LibGDX iOS RoboVM IPA

    environment:
      xcode: latest
      java: 17
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.studioyes.wordconnect

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Setup keychain and build IPA
        script: |
          set -e
          WORKDIR=$(pwd)

          # ── Provisioning profile ──────────────────────────────────────
          PROFILE=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE" ]; then echo "❌ No provisioning profile found!"; exit 1; fi
          echo "✅ Profile path: $PROFILE"

          # ── Keychain: build keychain'i DEFAULT yap ────────────────────
          BUILD_KEYCHAIN=$(security list-keychains | grep codemagic | tr -d '" ' | head -1)
          if [ -z "$BUILD_KEYCHAIN" ]; then
            BUILD_KEYCHAIN=$(security list-keychains | grep -v "login\|System\|ROOT" | head -1 | tr -d '" ')
          fi
          echo "Build keychain: $BUILD_KEYCHAIN"

          security set-keychain-settings -lut 7200 "$BUILD_KEYCHAIN" || true
          security unlock-keychain -p "" "$BUILD_KEYCHAIN" || true
          # Default keychain ol — RoboVM buraya bakar
          security default-keychain -s "$BUILD_KEYCHAIN" || true
          security list-keychains -d user -s "$BUILD_KEYCHAIN" \
            ~/Library/Keychains/login.keychain-db || true

          echo "=== Default keychain ==="
          security default-keychain

          echo "=== Signing identities ==="
          security find-identity -v -p codesigning

          # ── robovm.properties — UUID yerine TAM YOLU kullan ───────────
          # (UUID karşılaştırması bypass, path ile doğrudan okur)
          printf 'app.id=com.studioyes.wordconnect\n' > ios/robovm.properties
          printf 'app.signingIdentity=Apple Distribution: SEYFULLAH EJDERHA (33H863YMQ7)\n' >> ios/robovm.properties
          printf 'app.provisioningProfile=%s\n' "$PROFILE" >> ios/robovm.properties

          echo "=== robovm.properties ==="
          cat ios/robovm.properties

          # ── robovm.xml — sadece structural config, signing YOK ────────
          echo "=== robovm.xml (last 5 lines) ==="
          tail -5 ios/robovm.xml

          # ── createIPA ─────────────────────────────────────────────────
          echo "=== Running createIPA ==="
          ./gradlew ios:createIPA -x test --no-daemon 2>&1 | tee /tmp/robovm_build.log
          BUILD_EXIT=${PIPESTATUS[0]}

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "❌ createIPA failed (exit $BUILD_EXIT)"
            grep -iE "sign|identity|profile|provisioningProfile|fingerprint|certificate|bundleId|ERROR|FAILED|IOException|Element" \
              /tmp/robovm_build.log | grep -v "^>" | grep -v "Downloading\|Resource missing" | tail -40 || true
            exit 1
          fi

          # ── IPA bul ───────────────────────────────────────────────────
          IPA=$(find "$WORKDIR" -name "*.ipa" -not -path "*.gradle*" | head -1)
          if [ -z "$IPA" ]; then
            echo "❌ No .ipa found!"
            exit 1
          fi
          mkdir -p "$WORKDIR/ios/build/ipa"
          cp "$IPA" "$WORKDIR/ios/build/ipa/WordConnect.ipa"
          echo "✅ Done: ios/build/ipa/WordConnect.ipa ($(du -h "$IPA" | cut -f1))"

    artifacts:
      - ios/build/ipa/*.ipa
