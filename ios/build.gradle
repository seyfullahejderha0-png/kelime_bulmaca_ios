apply plugin: "java-library"
apply plugin: "robovm"

robovm {
    archs = "thumbv7:arm64"

    // Codemagic ortamında signing için
    iosSignIdentity = "iPhone Distribution"
    iosProvisioningProfile = file(System.getenv("CM_PROVISIONING_PROFILE_PATH"))
}

dependencies {
    implementation project(":core")
    api "com.badlogicgames.gdx:gdx-backend-robovm:$gdxVersion"
    api "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-ios"
    api "com.badlogicgames.gdx:gdx-box2d-platform:$gdxVersion:natives-ios"
    implementation 'org.jsoup:jsoup:1.21.2'
}